[build]
# Dockerfile path and context are both relative to the repo root.
# Setting dockerContext = "backend" makes COPY instructions resolve
# inside backend/ instead of the repo root.
dockerfilePath = "backend/Dockerfile"
dockerContext  = "backend"

[deploy]
healthcheckPath    = "/api/health"
healthcheckTimeout = 30
restartPolicyType  = "on_failure"
